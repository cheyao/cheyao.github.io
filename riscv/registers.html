<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML Basic 1.1//EN" "http://www.w3.org/TR/xhtml-basic/xhtml-basic11.dtd">
<html>
<head>
	<link rel="stylesheet" type="text/css" href="../styles/instructions.css" />
	<title>Registers (RISC-V Instruction Set Reference)</title>

	<meta name="keywords" content="assembly,asm,programming,optimization,optimisation,add,c,rv32i,RISC-V,instruction_set_reference_main_entries,opcode,opcodes,dictionary,risc"/>
	<meta name="description" content="RISC-V"/>
</head>
<body>
	<div class="main_container"><h1>RISC-V Instruction Set Reference</h1>
	<h1>Registers</h1>
	<object>
		<table class="box">
			<tr>
				<th>Register</th>
				<th>ABI Name</th>
				<th>Description</th>
				<th>Saver</th>
			</tr>
			<tr>
				<td class="grid">x0</td>
				<td class="grid">zero</td>
				<td class="grid">Hard-wired zero</td>
				<td class="grid">─</td>
			</tr>
			<tr>
				<td class="grid">x1</td>
				<td class="grid">ra</td>
				<td class="grid">Return address</td>
				<td class="grid">Caller</td>
			</tr>
			<tr>
				<td class="grid">x2</td>
				<td class="grid">sp</td>
				<td class="grid">Stack pointer</td>
				<td class="grid">Callee</td>
			</tr>
			<tr>
				<td class="grid">x3</td>
				<td class="grid">gp</td>
				<td class="grid">Global pointer</td>
				<td class="grid">─</td>
			</tr>
			<tr>
				<td class="grid">x4</td>
				<td class="grid">tp</td>
				<td class="grid">Thread pointer</td>
				<td class="grid">─</td>
			</tr>
			<tr>
				<td class="grid">x5</td>
				<td class="grid">t0</td>
				<td class="grid">Temporary/alternate link register</td>
				<td class="grid">Caller</td>
			</tr>
			<tr>
				<td class="grid">x6-x7</td>
				<td class="grid">t1-t2</td>
				<td class="grid">Temporaries</td>
				<td class="grid">Caller</td>
			</tr>
			<tr>
				<td class="grid">x8</td>
				<td class="grid">s0/fp</td>
				<td class="grid">Saved register/frame pointer</td>
				<td class="grid">Callee</td>
			</tr>
			<tr>
				<td class="grid">x9</td>
				<td class="grid">s1</td>
				<td class="grid">Saved register</td>
				<td class="grid">Callee</td>
			</tr>
			<tr>
				<td class="grid">x10–x11</td>
				<td class="grid">a0–a1</td>
				<td class="grid">Function arguments/return values</td>
				<td class="grid">Caller</td>
			</tr>
			<tr>
				<td class="grid">x12–x17</td>
				<td class="grid">a2-a7</td>
				<td class="grid">Function arguments</td>
				<td class="grid">Caller</td>
			</tr>
			<tr>
				<td class="grid">x18–x27</td>
				<td class="grid">s2–s11</td>
				<td class="grid">Saved registers</td>
				<td class="grid">Callee</td>
			</tr>
			<tr>
				<td class="grid">t3–t6</td>
				<td class="grid">t1-t2</td>
				<td class="grid">Temporaries</td>
				<td class="grid">Caller</td>
			</tr>
			<tr>
				<td class="grid"></td> 
			</tr>
			<tr>
				<td class="grid">f0–f7</td> 
				<td class="grid">ft0–ft7</td> 
				<td class="grid">FP temporaries</td> 
				<td class="grid">Caller</td>
			</tr>
			<tr>
				<td class="grid">f8–f9</td> 
				<td class="grid">fs0–fs1</td> 
				<td class="grid">FP saved registers</td> 
				<td class="grid">Callee</td>
			</tr>
			<tr>
				<td class="grid">f10–f11</td> 
				<td class="grid">fa0–fa1</td> 
				<td class="grid">FP arguments/return values</td> 
				<td class="grid">Caller</td>
			</tr>
			<tr>
				<td class="grid">f12–f17</td> 
				<td class="grid">fa2–fa7</td> 
				<td class="grid">FP arguments</td> 
				<td class="grid">Caller</td>
			</tr>
			<tr>
				<td class="grid">f18–f27</td> 
				<td class="grid">fs2–fs11</td> 
				<td class="grid">FP saved registers</td> 
				<td class="grid">Callee</td>
			</tr>
			<tr>
				<td class="grid">f28–f31</td> 
				<td class="grid">ft8–ft11</td> 
				<td class="grid">FP temporaries</td> 
				<td class="grid">Caller</td>
			</tr>
		</table>
	</object>
	</div>
