<body>
	<div class="main_container"><h1>RISC-V Instruction Set Reference</h1>
	<h1>BGE</h1>
	<h2>Branch if grater or equal</h2>
	<object>
		<table class="box">
			<tr>
				<th>Mnemonic</th>
				<th>Description</th>
			</tr>
			<tr>
				<td class="grid"><code>BGE rs1, rs2, imm12</code></td>
				<td class="grid">Add imm12 to pc if rs1 is greater or equal to rs2.</td>
			</tr>
			<tr>
				<td class="grid"><code>BGEU rs1, rs2, imm12</code></td>
				<td class="grid">Add imm12 to pc if rs1 is greater or equal to rs2 (unsigned).</td>
			</tr>
		</table>
	</object>
	<object>
		<table class="box">
			<tr>
				<th>Description</th>
			</tr>
			<tr>
				<td class="instruction_set_reference_box">
					<p>Add imm12 to pc if rs1 is greater or equal to rs2.</p>
				</td>
			</tr>
		</table>
	</object>
	<object>
		<table class="box">
			<tr>
				<th>Operation</th>
			</tr>
			<tr>
				<td class="instruction_set_reference_box">
<pre>
<span class="keyword">if</span> <span class="operator">(</span>rs1 <span class="operator">>=</span> rs2<span class="operator">)</span>
    pc <span class="operator">+=</span> imm12<span class="operator">;</span>
</pre>
				</td>
			</tr>
		</table>
	</object>
